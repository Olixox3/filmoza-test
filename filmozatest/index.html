<!DOCTYPE html> #
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Moja Biblioteka GoFile</title>
    <style>
        body { background: #121212; color: #fff; font-family: sans-serif; padding: 20px; }
        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; margin-top: 30px; }
        .item { background: #1e1e1e; padding: 10px; border-radius: 8px; text-align: center; border: 1px solid #333; }
        .item img { max-width: 100%; border-radius: 4px; }
        .item a { color: #00ca4e; text-decoration: none; display: block; margin-top: 10px; font-size: 14px; }
        .refresh-btn { background: #00ca4e; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <h1>Moja Biblioteka</h1>
    <button class="refresh-btn" onclick="loadFiles()">ODŚWIEŻ LISTĘ</button>

    <div class="gallery" id="gallery">
        Ładowanie plików...
    </div>

    <script>
        async function loadFiles() {
            const gallery = document.getElementById('gallery');
            try {
                const res = await fetch('/api/list');
                const files = await res.json();

                gallery.innerHTML = ''; // Czyścimy listę

                files.forEach(file => {
                    const div = document.createElement('div');
                    div.className = 'item';

                    // Jeśli to obrazek (png, jpg, gif)
                    if (file.name.match(/\.(jpeg|jpg|gif|png)$/) != null) {
                        div.innerHTML = `<img src="${file.link}" alt="${file.name}">`;
                    } 
                    // Jeśli to wideo (mp4, webm)
                    else if (file.name.match(/\.(mp4|webm)$/) != null) {
                        div.innerHTML = `<video width="100%" controls><source src="${file.link}" type="video/mp4"></video>`;
                    }
                    else {
                        div.innerHTML = `<div style="height:100px; display:flex; align-items:center; justify-content:center; background:#333;">📁 Plik</div>`;
                    }

                    div.innerHTML += `<a href="${file.link}" target="_blank">${file.name}</a>`;
                    gallery.appendChild(div);
                });

                if(files.length === 0) gallery.innerHTML = "Folder jest pusty.";

            } catch (e) {
                gallery.innerHTML = "Błąd podczas ładowania plików.";
            }
        }

        // Ładuj pliki od razu po wejściu na stronę
        loadFiles();
    </script>
</body>
</html>
